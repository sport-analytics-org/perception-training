name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?missing DEPLOY_HOST}"
          : "${DEPLOY_SSH_KEY:?missing DEPLOY_SSH_KEY}"
          : "${CF_ACCESS_CLIENT_ID:?missing CF_ACCESS_CLIENT_ID}"
          : "${CF_ACCESS_CLIENT_SECRET:?missing CF_ACCESS_CLIENT_SECRET}"

          SSH_DIR="$HOME/.ssh"
          SSH_KEY="$SSH_DIR/court_vision_deploy"

          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          printf '%s\n' "$DEPLOY_SSH_KEY" >"$SSH_KEY"
          chmod 600 "$SSH_KEY"

          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          sudo install -m 0755 cloudflared /usr/local/bin/cloudflared

          timeout 60s ssh \
            -i "$SSH_KEY" \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            -o "ProxyCommand=cloudflared access tcp --hostname %h --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET} --loglevel debug" \
            "deploy@$DEPLOY_HOST" \
            perception-training
